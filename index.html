<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIA - Tech Install Application</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>TIA</h1>
                <p>Tech Install Application</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter username" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" required>
                </div>
                <div id="loginError" class="error-message hidden"></div>
                <button type="submit" class="btn btn-primary btn-full" id="loginBtn">Sign In</button>
            </form>
        </div>
        <p class="login-footer">Mercy Health &mdash; Internal Use Only</p>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Redirect if already logged in
        if (Auth.isSessionValid()) {
            window.location.href = "form.html";
        }

        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = document.getElementById("loginBtn");
            const errorDiv = document.getElementById("loginError");
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value;

            btn.disabled = true;
            btn.textContent = "Signing in...";
            errorDiv.classList.add("hidden");

            try {
                const res = await fetch(`${CONFIG.API_BASE}/auth/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });

                if (res.ok) {
                    const data = await res.json();
                    Auth.setSession(data.access_token, data.username, data.role);
                    window.location.href = "form.html";
                } else {
                    const err = await res.json();
                    errorDiv.textContent = err.detail || "Invalid username or password";
                    errorDiv.classList.remove("hidden");
                }
            } catch (err) {
                errorDiv.textContent = "Could not connect to server. Please try again.";
                errorDiv.classList.remove("hidden");
            }

            btn.disabled = false;
            btn.textContent = "Sign In";
        });
    </script>
</body>
</html>
